<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دعوة زواج المهندس عبدالله</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Mirza:wght@400;500;600;700&family=Noto+Naskh+Arabic:wght@400;600;700&family=Scheherazade+New:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=2">
</head>
<body>

<!-- ── image ── -->
<section id="invite">
    <img src="invite.jpg" alt="دعوة زواج المهندس عبدالله">

    <div class="scroll-cue" aria-label="التفاصيل">
        <span class="cue-label">التفاصيل</span>
        <div class="cue-arrow"></div>
    </div>
</section>

<!-- ── Details ── -->
<section id="details">
    <div class="details-inner" id="details-inner">

        <h2 class="panel-title">تفاصيل الحفل</h2>

        <div class="rule"></div>

        <div class="info-row">

            <div class="info-item">
                <div class="info-label">التاريخ</div>
                <div class="info-main">السبت ٢٦ محرم ١٤٤٨ </div>
                <div class="info-sub">الموافق ١١ يوليو ٢٠٢٦</div>
            </div>

            <div class="info-divider"></div>

            <div class="info-item">
                <div class="info-label">الوقت</div>
                <div class="info-main">بعد صلاة العشاء</div>
                <div class="info-sub">٩:٠٠ مساءً</div>
            </div>

            <div class="info-divider"></div>

            <div class="info-item">
                <div class="info-label">المكان</div>
                <div class="info-main">قاعة ألف ليلة</div>
                <div class="info-sub">شارع المكرونة، الربوة، جدة</div>
            </div>

        </div>

        <div class="map-wrap">
            <iframe
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3709.7988384339105!2d39.185678!3d21.5937739!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x15c3d0e619471d57%3A0xa1e404e0ab596702!2sThousand%20Nights%20Hall!5e0!3m2!1sen!2ssa!4v1779980497914!5m2!1sen!2ssa"
                allowfullscreen=""
                loading="lazy"
                referrerpolicy="no-referrer-when-downgrade">
            </iframe>
        </div>

        <p class="blessing">وبحضوركم يتم لنا الفرح والسرور</p>

    </div>
</section>

<script src="main.js"></script>
</body>
</html>
